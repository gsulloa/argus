[package]
name = "argus"
version = "0.6.1"
description = "A Tauri 2 desktop app for inspecting and editing data across PostgreSQL, MySQL/MariaDB, Microsoft SQL Server, DynamoDB, Amazon CloudWatch Logs, and Amazon Athena."
authors = ["Gabriel Ulloa <gabriel.ulloa.e@gmail.com>"]
license = "MIT"
repository = "https://github.com/gsulloa/argus"
homepage = "https://github.com/gsulloa/argus"
edition = "2021"
rust-version = "1.77"

[lib]
name = "argus_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-dialog = "2"
tauri-plugin-fs = "2"
tauri-plugin-window-state = "2"
tauri-plugin-updater = "2"
tauri-plugin-process = "2"
tokio = { version = "1", features = ["full"] }
rusqlite = { version = "0.32", features = ["bundled"] }
keyring = { version = "3", features = ["apple-native", "windows-native", "linux-native"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sqlx = { version = "0.8", default-features = false, features = ["runtime-tokio-rustls", "mysql", "chrono", "bigdecimal", "json", "uuid", "macros"] }
thiserror = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tracing-appender = "0.2"
uuid = { version = "1", features = ["v4", "serde"] }
directories = "5"
tokio-postgres = { version = "0.7", features = ["with-serde_json-1", "with-time-0_3", "with-uuid-1"] }
deadpool-postgres = "0.14"
rustls = { version = "0.23", default-features = false, features = ["ring", "std", "tls12", "logging"] }
tokio-postgres-rustls = "0.13"
webpki-roots = "0.26"
rustls-pki-types = "1"
url = "2"
regex = "1"
percent-encoding = "2"
time = { version = "0.3", features = ["formatting", "macros", "serde"] }
async-trait = "0.1"
aws-sdk-athena = "1.104.0"
aws-sdk-dynamodb = "1.111.0"
aws-sdk-glue = "1.114.0"
aws-sdk-s3 = "1.104.0"
aws-sdk-sts = "1.103.0"
aws-config = "1.8.16"
# Transitive dep, pinned explicitly so we can pattern-match on SdkError variants.
aws-smithy-runtime-api = "1.12.0"
base64 = "0.22"
chrono = { version = "0.4", features = ["serde"] }
# MS SQL Server (tiberius). NOTE: Cargo.lock has two rustls copies: 0.21.12 (sqlx) + 0.23.39 (tiberius + tokio-postgres-rustls). Accepted per design D14/Q1.
tiberius = { version = "0.12", default-features = false, features = ["rustls", "chrono", "time", "bigdecimal", "sql-browser-tokio", "tds73"] }
bb8 = "0.8"
bb8-tiberius = "0.15"
tokio-util = { version = "0.7", features = ["compat"] }
# bigdecimal pinned to the version used by tiberius 0.12 (0.3.x) for DECIMAL/MONEY decode+bind.
bigdecimal = "0.3"
notify = "6"
serde_yaml = "0.9"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
tokio-stream = { version = "0.1", features = ["io-util"] }
futures = "0.3"
aws-sdk-cloudwatchlogs = "1.43.0"

[features]
# disabled in tests so we can avoid hitting the OS keychain
keychain = []
# Live Postgres tests — opt-in, requires a reachable server (PG_TEST_URL env var).
live-pg-tests = []
# Live MySQL tests — opt-in, requires a reachable server (MYSQL_TEST_URL env var).
live-mysql-tests = []
# Live MS SQL Server tests — opt-in, requires a reachable server.
#   MSSQL_TEST_URL  — connection string in mssql://, sqlserver://, JDBC, or ADO.NET format.
#   MSSQL_TEST_TRUST_CERT=1 — skip TLS certificate verification (needed for local Docker images).
# Example:
#   MSSQL_TEST_URL=mssql://sa:Password@localhost:1433/master \
#   MSSQL_TEST_TRUST_CERT=1 \
#   cargo test --features live-mssql-tests
live-mssql-tests = []

[dev-dependencies]
tempfile = "3"
wiremock = "0.6"
# Pinned to the exact transitive dep version; required for constructing
# ErrorMetadata test fixtures in dynamo/client.rs §5.5.
aws-smithy-types = "1.4.7"

[profile.release]
panic = "abort"
codegen-units = 1
lto = true
opt-level = "s"
strip = true
